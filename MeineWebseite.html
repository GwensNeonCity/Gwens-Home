<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine erste Webseite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#111827,#1f2937,#0f172a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card{
    width:90%;
    max-width:700px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,255,255,.15);
}
h1{
    font-size:3rem;
    color:#59f3ff;
    text-shadow:0 0 12px #59f3ff;
}
p{
    margin:20px 0;
    font-size:1.2rem;
    line-height:1.6;
}
button{
    padding:15px 35px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:1rem;
    background:#59f3ff;
    color:#111827;
    transition:.25s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #59f3ff;
}
</style>
</head>
<body>

<div class="card">
<h1>Hallo Jaqueline 👋</h1>

<p>Herzlichen Glückwunsch!<br>
Das ist deine erste selbst erstellte HTML-Webseite.</p>

<button onclick="zeigeNachricht()">Klick mich</button>
</div>

<script>
function zeigeNachricht(){
    alert("🎉 Glückwunsch! Deine erste HTML-Seite funktioniert!");
}
</script>

</body>
</html>
